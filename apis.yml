aid: worthington-industries
name: Worthington Industries
description: >-
  Worthington Industries was a global diversified metals manufacturing company
  specializing in value-added steel processing and manufactured metal products.
  In December 2023, the company split into two publicly traded companies:
  Worthington Enterprises (consumer and building products) and Worthington Steel
  (flat-rolled steel processing, electrical steel laminations, and tailor-welded
  blanks). Worthington Industries does not offer a public developer API.
